syntax = "proto3";
package patient;

service PatientService {
  rpc CreatePatient (CreatePatientRequest) returns (PatientResponse);
  rpc GetPatient (GetPatientRequest) returns (PatientResponse);
  rpc UpdatePatient (UpdatePatientRequest) returns (PatientResponse);
  rpc DeletePatient (DeletePatientRequest) returns (DeleteResponse);
  rpc ListPatients (ListPatientsRequest) returns (ListPatientsResponse);
  rpc SearchPatients (SearchPatientsRequest) returns (ListPatientsResponse);
}
message CreatePatientRequest {
  string firstName = 1; string lastName = 2; string dateOfBirth = 3;
  string gender = 4; string phone = 5; string email = 6;
  string address = 7; string bloodType = 8;
}
message GetPatientRequest { string id = 1; }
message UpdatePatientRequest {
  string id = 1; string firstName = 2; string lastName = 3;
  string phone = 4; string email = 5; string address = 6;
}
message DeletePatientRequest { string id = 1; }
message DeleteResponse { bool success = 1; string message = 2; }
message ListPatientsRequest { int32 page = 1; int32 limit = 2; }
message SearchPatientsRequest { string query = 1; }
message PatientResponse {
  string id = 1; string firstName = 2; string lastName = 3;
  string dateOfBirth = 4; string gender = 5; string phone = 6;
  string email = 7; string address = 8; string bloodType = 9; string createdAt = 10;
}
message ListPatientsResponse { repeated PatientResponse patients = 1; int32 total = 2; }
